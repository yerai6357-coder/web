<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Consulta el tiempo actual en L'Ametlla de Mar con datos en tiempo real y detalles de sensación térmica y viento.">

<title>Tiempo - L'Ametlla de Mar</title>

<link rel="icon" href="imagen/OIP (1).jpg" type="image/jpeg">
<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar" aria-label="Navegación principal">
<a href="index.html">Inicio</a>
<a href="tiempo.html">Tiempo</a>
</nav>

<main>

<div class="caja-clima" role="status" aria-live="polite">

<p class="ciudad">L'Ametlla de Mar</p>

<div id="cargando">Cargando datos reales...</div>

<div id="contenido-clima" style="display:none;">

<div class="temp" id="valor-temp">--°</div>

<div class="detalles">

<div class="dato">
<span class="etiqueta">Sensación</span>
<strong id="valor-sensacion">--°</strong>
</div>

<div class="dato">
<span class="etiqueta">Viento</span>
<strong id="valor-viento">-- km/h</strong>
</div>

</div>

</div>

</main>

<footer>
<p>&copy; 2026 Yerai - Proyecto sobre Sitios Históricos de L'Ametlla de Mar. Todos los derechos reservados.</p>
</footer>

<script>

async function actualizarDatos() {

const url = "https://api.open-meteo.com/v1/forecast?latitude=40.88&longitude=0.80&current_weather=true&hourly=apparent_temperature";

try {

const respuesta = await fetch(url);

if (!respuesta.ok) throw new Error(`HTTP ${respuesta.status}`);

const datos = await respuesta.json();

const temperatura = Math.round(datos.current_weather.temperature);
const viento = Math.round(datos.current_weather.windspeed);
const sensacion = Math.round(datos.hourly.apparent_temperature[0]);

document.getElementById('valor-temp').innerText = `${temperatura}°C`;
document.getElementById('valor-viento').innerText = `${viento} km/h`;
document.getElementById('valor-sensacion').innerText = `${sensacion}°C`;

document.getElementById('cargando').style.display = 'none';
document.getElementById('contenido-clima').style.display = 'block';

} catch (error) {

document.getElementById('cargando').innerText = "Error al conectar con la estación meteorológica";

console.error("Error carga clima:", error);

}

}

document.addEventListener("DOMContentLoaded", function () {

actualizarDatos();

setInterval(actualizarDatos, 10 * 60 * 1000);

});

</script>

</body>
</html>
