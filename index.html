</div>

<div class="login-buttons" id="loginButtons">
<button onclick="loginGoogle()">Continuar con Google</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDm1WQMKrvH9O1tltJOhUP4xZVvhNjwH3s",
  authDomain: "historialametlla.firebaseapp.com",
  projectId: "historialametlla",
  storageBucket: "historialametlla.firebasestorage.app",
  messagingSenderId: "768005022848",
  appId: "1:768005022848:web:da640ab9ad3b2b7b723265"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* LOGIN */
window.loginGoogle = async () => {
    try {
        await signInWithPopup(auth, provider);
    } catch (error) {
        alert("Error al iniciar sesión");
        console.error(error);
    }
}

/* LOGOUT */
window.logout = () => signOut(auth);

/* UI PRO */
onAuthStateChanged(auth, (user) => {

    const usuario = document.getElementById("usuario");
    const foto = document.getElementById("userFoto");
    const loginButtons = document.getElementById("loginButtons");
    const logoutBtn = document.getElementById("logoutBtn");

    if (user) {
        usuario.textContent = user.displayName;
        foto.src = user.photoURL;
        foto.style.display = "block";

        loginButtons.style.display = "none";
        logoutBtn.style.display = "inline-block";

    } else {
        usuario.textContent = "No has iniciado sesión";
        foto.style.display = "none";

        loginButtons.style.display = "block";
        logoutBtn.style.display = "none";
    }

});

</script>

</body>
</html>
